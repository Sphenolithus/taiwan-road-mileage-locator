<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>台灣主要道路里程定位</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.6.1/ol.css" />
    <link rel="stylesheet" href="./styles.css?v=20260724-radar-overlay" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="道路里程定位條件">
        <div class="brand-block">
          <p class="eyebrow">Road Milepost Locator</p>
          <h1>台灣主要道路里程定位</h1>
        </div>

        <div class="field-group">
          <span class="field-label">道路類別</span>
          <div class="segmented" role="group" aria-label="道路類別">
            <button class="segment is-active" type="button" data-category="freeway">高速公路</button>
            <button class="segment" type="button" data-category="expressway">快速道路</button>
            <button class="segment" type="button" data-category="provincial">平面道路</button>
          </div>
        </div>

        <label class="field">
          <span class="field-label">路線</span>
          <select id="routeSelect"></select>
        </label>

        <label class="field">
          <span class="field-label">方向</span>
          <select id="directionSelect"></select>
        </label>

        <label class="field">
          <span class="field-label">里程</span>
          <div class="mile-input">
            <input id="kmInput" type="text" value="10.0" inputmode="text" placeholder="例：100K+400、100K400、100.4" />
            <span>km</span>
          </div>
        </label>

        <div class="actions">
          <button id="locateButton" class="primary-button" type="button">定位</button>
          <a id="streetViewButton" class="secondary-button is-disabled" target="_blank" rel="noreferrer">Street View</a>
        </div>

        <div class="field-group">
          <span class="field-label">底圖</span>
          <div class="basemap-options" role="group" aria-label="底圖選擇">
            <button class="basemap-button is-active" type="button" data-basemap="street">一般地圖</button>
            <button class="basemap-button" type="button" data-basemap="imagery">衛星影像</button>
            <button class="basemap-button" type="button" data-basemap="terrain">地形圖</button>
          </div>
        </div>

        <div class="layer-control">
          <label class="toggle-row">
            <input id="radarLayerToggle" type="checkbox" />
            <span>疊加雷達回波</span>
          </label>
          <label class="range-field">
            <span class="field-label">雷達透明度</span>
            <input id="radarOpacityInput" type="range" min="15" max="90" step="5" value="62" />
          </label>
          <p id="radarStatus" class="muted">雷達回波圖層目前關閉。</p>
        </div>

        <section id="resultCard" class="result-card" aria-live="polite">
          <p class="muted">請選擇道路與方向，輸入罰單上的里程數。</p>
        </section>

        <section class="data-panel">
          <h2>資料狀態</h2>
          <p id="dataStatus"></p>
        </section>

        <section class="note-panel">
          <h2>備註</h2>
          <p>本專案為林彥均 練習Codex Vibe code成果；原創者為楊宇恩博士。</p>
          <p>可依 "道路里程" 定位道路位置，支援 100K+400、100K400、100.4 輸入格式，以及在地圖上點選位置 等查詢方式。</p>
          <p>本專案提供定位點最近3隻CCTV、以及未來一周天氣預報查詢。</p>
        </section>
      </section>

      <section class="map-panel" aria-label="定位地圖">
        <div id="map" class="map"></div>
      </section>
    </main>

    <div id="cameraDialog" class="camera-dialog" hidden>
      <div class="camera-dialog__backdrop" data-close-camera-dialog></div>
      <div class="camera-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="cameraDialogTitle">
        <button class="camera-dialog__close" type="button" aria-label="關閉" data-close-camera-dialog>×</button>
        <img id="cameraDialogImage" alt="" />
        <h2 id="cameraDialogTitle"></h2>
        <p id="cameraDialogMeta"></p>
        <div class="camera-dialog__actions">
          <a id="cameraDialogStream" class="camera-link" target="_blank" rel="noreferrer">開啟影像</a>
          <a id="cameraDialogSnapshot" class="text-link" target="_blank" rel="noreferrer">開啟快照</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@10.6.1/dist/ol.js"></script>
    <script src="./app.js?v=20260724-radar-overlay"></script>
  </body>
</html>
